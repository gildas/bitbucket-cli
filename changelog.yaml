      note: |-
        fix: handle empty resolution object from Bitbucket API

        - GetRow: gracefully render "resolved" when resolution is {} (empty
          object) instead of showing "resolved by  on 0001-01-01..."
        - MarshalJSON: omit created_on when zero instead of emitting
          "0001-01-01T00:00:00Z"
      author:
        name: Mike Ramirez
        email: mike@labelgrid.com
      committer:
        name: Mike Ramirez
        email: mike@labelgrid.com
    - commit: 1a01e61ef7d655196b8574f0dffed42e2598f848
      note: |-
        Add resolution field to PullRequestComment

        The Bitbucket REST API v2.0 returns a resolution object on PR comments,
        but the CLI was dropping it at deserialization. This adds:

        - Resolution struct (type, user, created_on)
        - Resolution field on Comment struct
        - Column, sorting, and table row support
        - MarshalJSON for consistent time formatting

        Closes #75
      author:
        name: Mike Ramirez
        email: mike@labelgrid.com
      committer:
        name: Mike Ramirez
        email: mike@labelgrid.com
